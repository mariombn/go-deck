# Gera os binários de produção (Windows + macOS) quando um release é publicado.
#
# Por que runners nativos (e não cross-compile):
#   - macOS usa CGO (CGEvent, em sendinput_darwin.go) -> precisa do toolchain Apple.
#   - O webview do Wails depende de libs nativas de cada SO.
# Logo: um runner por plataforma via matrix. Não há cross-compilation confiável aqui.
#
# Disparo: ao publicar um Release no GitHub. Os artefatos são anexados ao próprio release.
name: release

on:
  release:
    types: [published]
  # Permite rodar manualmente (gera os binários como artifacts do run, sem anexar a release).
  workflow_dispatch:

permissions:
  contents: write # necessário para o action-gh-release anexar os binários ao release

jobs:
  build:
    name: build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            # Windows: SendInput em Go puro (sem CGO). Binário solto basta.
            asset: build/bin/go-deck.exe
          - os: macos-latest
            # macOS: bundle .app -> empacotado em .zip no passo abaixo.
            asset: build/bin/go-deck-macos.zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache-dependency-path: go.sum

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar a CLI do Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # wails build: regenera bindings, builda o frontend (npm install + build) e gera build/bin.
      - name: Wails build
        run: wails build

      # Release do GitHub não aceita diretório: o .app vira um .zip antes do upload.
      - name: Empacotar .app (macOS)
        if: runner.os == 'macOS'
        run: cd build/bin && zip -r go-deck-macos.zip go-deck.app

      # Quando o disparo é um release publicado: anexa o binário ao release.
      - name: Anexar ao release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

      # Quando o disparo é manual (workflow_dispatch): guarda como artifact do run.
      - name: Subir artifact (run manual)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: go-deck-${{ runner.os }}
          path: ${{ matrix.asset }}
